---
apiVersion: v1
kind: Namespace
metadata:
  name: atlantis
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: atlantis
  namespace: atlantis
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: atlantis-env
  namespace: atlantis
data:
  cloud_id:           "b1g7i90u6v2v15jrqpdj"
  folder_id:          "b1gnfat6d5tspst8frqn"
  service_account_id: "ajekito9ie0cffqj42uu"
  project_name:       "diplom-devops"
  ssh_public_key_path: "/home/atlantis/.ssh/id_rsa.pub"
  atlantis_port:      "4141"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: atlantis-config
  namespace: atlantis
data:
  repos.yaml: |
    repos:
    - id: github.com/ComondanteChe/diplom-devops
      allowed_overrides: [workflow]
      allow_custom_workflows: true
      apply_requirements: [approved]
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: atlantis-terraformrc
  namespace: atlantis
data:
  .terraformrc: |
    provider_installation {
      network_mirror {
        url = "https://terraform-mirror.yandexcloud.net/"
        include = ["registry.terraform.io/*/*"]
      }
      direct {
        exclude = ["registry.terraform.io/*/*"]
      }
    }
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: atlantis
  namespace: atlantis
spec:
  serviceName: atlantis
  replicas: 1
  selector:
    matchLabels:
      app: atlantis
  template:
    metadata:
      labels:
        app: atlantis
    spec:
      serviceAccountName: atlantis
      initContainers:
      - name: install-terraform
        image: alpine:3.19
        command:
        - sh
        - -c
        - |
          wget -q "https://hashicorp-releases.yandexcloud.net/terraform/1.14.8/terraform_1.14.8_linux_amd64.zip" -O /tmp/terraform.zip && \
          unzip /tmp/terraform.zip -d /tmp && \
          mkdir -p /atlantis-data/bin && \
          mv /tmp/terraform /atlantis-data/bin/terraform1.14.8 && \
          chmod +x /atlantis-data/bin/terraform1.14.8 && \
          echo "Terraform installed successfully"
        volumeMounts:
        - name: atlantis-data
          mountPath: /atlantis-data
      containers:
      - name: atlantis
        image: ghcr.io/runatlantis/atlantis:v0.31.0
        args:
        - server
        - --atlantis-url=http://${CLUSTER_HOST}:${INGRESS_HTTP_PORT}/atlantis
        - --gh-user=ComondanteChe
        - --gh-token=$(GITHUB_TOKEN)
        - --gh-webhook-secret=$(GITHUB_WEBHOOK_SECRET)
        - --repo-allowlist=github.com/ComondanteChe/diplom-devops
        - --repo-config=/etc/atlantis/repos.yaml
        - --write-git-creds
        - --port=4141
        - --default-tf-version=v1.14.8
        - --data-dir=/atlantis-data
        env:
        - name: GITHUB_TOKEN
          valueFrom:
            secretKeyRef:
              name: atlantis-secrets
              key: github_token
        - name: GITHUB_WEBHOOK_SECRET
          valueFrom:
            secretKeyRef:
              name: atlantis-secrets
              key: github_webhook_secret
        - name: TF_VAR_yc_token
          valueFrom:
            secretKeyRef:
              name: atlantis-secrets
              key: yc_token
        - name: ATLANTIS_PORT
          valueFrom:
            configMapKeyRef:
              name: atlantis-env
              key: atlantis_port
        - name: AWS_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              name: atlantis-secrets
              key: aws_key
        - name: AWS_SECRET_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: atlantis-secrets
              key: aws_secret_key
        - name: TF_VAR_aws_key
          valueFrom:
            secretKeyRef:
              name: atlantis-secrets
              key: aws_key
        - name: TF_VAR_aws_secret_key
          valueFrom:
            secretKeyRef:
              name: atlantis-secrets
              key: aws_secret_key
        - name: TF_VAR_cloud_id
          valueFrom:
            configMapKeyRef:
              name: atlantis-env
              key: cloud_id
        - name: TF_VAR_folder_id
          valueFrom:
            configMapKeyRef:
              name: atlantis-env
              key: folder_id
        - name: TF_VAR_service_account_id
          valueFrom:
            configMapKeyRef:
              name: atlantis-env
              key: service_account_id
        - name: TF_VAR_project_name
          valueFrom:
            configMapKeyRef:
              name: atlantis-env
              key: project_name
        - name: TF_VAR_ssh_public_key_path
          valueFrom:
            configMapKeyRef:
              name: atlantis-env
              key: ssh_public_key_path
        ports:
        - containerPort: 4141
          name: atlantis
        volumeMounts:
        - name: atlantis-data
          mountPath: /atlantis-data
        - name: atlantis-config
          mountPath: /etc/atlantis
        - name: atlantis-terraformrc
          mountPath: /home/atlantis/.terraformrc
          subPath: .terraformrc
        - name: atlantis-ssh
          mountPath: /home/atlantis/.ssh/id_rsa.pub
          subPath: ssh_public_key
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
        readinessProbe:
          httpGet:
            path: /healthz
            port: 4141
          initialDelaySeconds: 10
          periodSeconds: 10
      volumes:
      - name: atlantis-config
        configMap:
          name: atlantis-config
      - name: atlantis-terraformrc
        configMap:
          name: atlantis-terraformrc
      - name: atlantis-ssh
        secret:
          secretName: atlantis-secrets
          items:
          - key: ssh_public_key
            path: ssh_public_key
  volumeClaimTemplates:
  - metadata:
      name: atlantis-data
    spec:
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          storage: 5Gi
---
apiVersion: v1
kind: Service
metadata:
  name: atlantis
  namespace: atlantis
spec:
  selector:
    app: atlantis
  ports:
  - port: 80
    targetPort: 4141
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: atlantis
  namespace: atlantis
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/rewrite-target: /$2
spec:
  ingressClassName: nginx
  rules:
  - host: "${CLUSTER_HOST}"
    http:
      paths:
      - path: /atlantis(/|$)(.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: atlantis
            port:
              number: 80
