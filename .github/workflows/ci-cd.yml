name: CI/CD Pipeline

on:
  push:
    paths:
      - 'nginx/**'
    branches:
      - '**'
    tags:
      - 'v*.*.*'

env:
  REGISTRY: cr.yandex/crp9d347bcdius5nhmk8
  IMAGE_NAME: nginx-app

jobs:
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest

    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image tag
        id: meta
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            TAG="${{ github.ref_name }}"
          else
            TAG="${{ github.sha }}"
          fi
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "IMAGE_TAG=${TAG}" >> $GITHUB_ENV

      - name: Login to Yandex Container Registry
        run: |
          IAM_TOKEN=$(curl -sf -X POST \
            -H "Content-Type: application/json" \
            -d "{\"yandexPassportOauthToken\": \"$YC_OAUTH_TOKEN\"}" \
            https://iam.api.cloud.yandex.net/iam/v1/tokens | jq -r '.iamToken')
          if [ -z "$IAM_TOKEN" ] || [ "$IAM_TOKEN" = "null" ]; then
            echo "Failed to get IAM token"
            exit 1
          fi
          echo "${IAM_TOKEN}" | docker login cr.yandex \
            --username iam \
            --password-stdin
        env:
          YC_OAUTH_TOKEN: ${{ secrets.YC_OAUTH_TOKEN }}

      - name: Build Docker image
        run: |
          docker build -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} \
            ./nginx/

      - name: Push Docker image
        run: |
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}

      - name: Push latest tag (on tag only)
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          docker tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: build-and-push
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Setup kubectl
        uses: azure/setup-kubectl@v3

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Get fresh IAM token for registry
        run: |
          IAM_TOKEN=$(curl -sf -X POST \
            -H "Content-Type: application/json" \
            -d "{\"yandexPassportOauthToken\": \"$YC_OAUTH_TOKEN\"}" \
            https://iam.api.cloud.yandex.net/iam/v1/tokens | jq -r '.iamToken')
          kubectl create secret docker-registry yc-registry \
            --namespace=app \
            --docker-server=cr.yandex \
            --docker-username=iam \
            --docker-password="${IAM_TOKEN}" \
            --dry-run=client -o yaml | kubectl apply -f -
        env:
          YC_OAUTH_TOKEN: ${{ secrets.YC_OAUTH_TOKEN }}

      - name: Deploy new image
        run: |
          kubectl set image deployment/nginx-app \
            nginx-app=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }} \
            --namespace=app
          kubectl rollout status deployment/nginx-app --namespace=app --timeout=120s
